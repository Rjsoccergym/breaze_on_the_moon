server:
  port: 8081 # Cada micro tendrá su puerto (8081 Auth, 8082 Rooms, 8083 Booking)

spring:
  application:
    name: auth-service
  jackson:
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5431}/${DB_NAME:authDB}
    username: ${DB_USER:auth}
    password: ${DB_PASSWORD:auth123}

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service API
        url: /openapi/auth-service.yml

# Configuración personalizada para tu JwtService
jwt:
  secret: ${JWT_SECRET:mi_clave_secreta_super_segura_de_maestria_2026}
  expiration: 3600000 # 1 hora en milisegundos

app:
  auditoria-url: ${AUDITORIA_URL:https://0m1tpn7om6.execute-api.us-east-1.amazonaws.com/default/breaze_in_the_moon_audits}