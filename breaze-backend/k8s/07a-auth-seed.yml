apiVersion: batch/v1
kind: Job
metadata:
  name: auth-seed-job
  namespace: breaze
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: auth-seed
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do
                echo "Esperando a auth-postgres..."
                sleep 5
              done

              until [ "$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -Atqc "SELECT to_regclass('public.personas') IS NOT NULL;")" = "t" ]; do
                echo "Esperando la tabla personas..."
                sleep 5
              done

              psql -v ON_ERROR_STOP=1 -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -f /seed/seed.sql
          env:
            - name: PGHOST
              value: auth-postgres
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: DB_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: DB_PASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: DB_NAME
          volumeMounts:
            - name: auth-seed-volume
              mountPath: /seed
      volumes:
        - name: auth-seed-volume
          configMap:
            name: auth-seed-sql
