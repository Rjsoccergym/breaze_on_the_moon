apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-seed-sql
  namespace: breaze
data:
  seed.sql: |
    INSERT INTO personas (
      id,
      username,
      password,
      nombre,
      apellido,
      tipo_identificacion,
      numero_identificacion,
      telefono,
      email,
      fecha_nacimiento,
      rol,
      created_at,
      updated_at
    )
    SELECT
      '11111111-1111-1111-1111-111111111111'::uuid,
      'seedadmin',
      '$2a$10$byt4Gx.Wr9HCeNjYVtZ41eSWGZ7sIs0X.OmkjixCXvh1FRD0pUbJO',
      'Admin',
      'Breaze',
      'CC',
      '900000001',
      '3000000001',
      'seedadmin@breaze.local',
      DATE '1990-01-15',
      'ADMIN',
      TIMESTAMP '2026-01-10 09:00:00',
      TIMESTAMP '2026-01-10 09:00:00'
    WHERE NOT EXISTS (
      SELECT 1 FROM personas WHERE username = 'seedadmin'
    );

    INSERT INTO personas (
      id,
      username,
      password,
      nombre,
      apellido,
      tipo_identificacion,
      numero_identificacion,
      telefono,
      email,
      fecha_nacimiento,
      rol,
      created_at,
      updated_at
    )
    SELECT
      '22222222-2222-2222-2222-222222222222'::uuid,
      'seedclient',
      '$2a$10$e7Xls5hltX5agLsXs9ISSOdyljKqkRLgBgMKrtstDrzsyk6M9xGci',
      'Cliente',
      'Breaze',
      'CC',
      '900000002',
      '3000000002',
      'seedclient@breaze.local',
      DATE '1996-07-20',
      'CLIENT',
      TIMESTAMP '2026-01-10 09:05:00',
      TIMESTAMP '2026-01-10 09:05:00'
    WHERE NOT EXISTS (
      SELECT 1 FROM personas WHERE username = 'seedclient'
    );
---
apiVersion: batch/v1
kind: Job
metadata:
  name: auth-seed-job
  namespace: breaze
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: auth-seed
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do
                echo "Esperando a auth-postgres..."
                sleep 5
              done

              until [ "$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -Atqc "SELECT to_regclass('public.personas') IS NOT NULL;")" = "t" ]; do
                echo "Esperando la tabla personas..."
                sleep 5
              done

              psql -v ON_ERROR_STOP=1 -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -f /seed/seed.sql
          env:
            - name: PGHOST
              value: auth-postgres
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: DB_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: DB_PASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: DB_NAME
          volumeMounts:
            - name: auth-seed-volume
              mountPath: /seed
      volumes:
        - name: auth-seed-volume
          configMap:
            name: auth-seed-sql
