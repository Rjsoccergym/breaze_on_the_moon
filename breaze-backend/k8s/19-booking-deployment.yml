apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: breaze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: booking-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: DB_HOST
              value: booking-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: secret-booking
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: secret-booking
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-booking
                  key: DB_PASSWORD
            - name: ROOM_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: secret-booking
                  key: ROOM_SERVICE_URL
            - name: AUDITORIA_URL
              valueFrom:
                secretKeyRef:
                  name: secret-booking
                  key: AUDITORIA_URL
