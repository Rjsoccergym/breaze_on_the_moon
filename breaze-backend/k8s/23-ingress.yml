apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: breaze-ingress
  namespace: breaze
spec:
  ingressClassName: nginx
  rules:
    - host: breaze.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
