apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: breaze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: auth-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: JWT_SECRET
            - name: INTERNAL_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: INTERNAL_SHARED_SECRET
            - name: AUDITORIA_URL
              valueFrom:
                secretKeyRef:
                  name: secret-auth
                  key: AUDITORIA_URL
