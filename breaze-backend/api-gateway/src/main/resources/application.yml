server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Microservicio de Autenticación
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/v1/auth/**

        # Microservicio de Habitaciones (Room Service)
        - id: room-service
          uri: ${ROOM_SERVICE_URL:http://room-service:8082}
          predicates:
            - Path=/api/v1/room/**

        # Microservicio de Reservas (Booking Service)
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://booking-service:8083}
          predicates:
            - Path=/api/v1/booking/**

        # Canal interno de auditoría hacia Lambda (enricha y persiste en MongoDB)
        - id: audit-lambda
          uri: ${AUDITORIA_LAMBDA_BASE_URL}
          predicates:
            - Path=/internal/audits
          filters:
            - SetPath=${AUDITORIA_LAMBDA_PATH:/default/breaze_in_the_moon_audits}

      # Configuración de CORS centralizada (Vital si vas a conectar un Frontend o App)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - OPTIONS
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
            allowedHeaders: "*"

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000 # 1 hora en milisegundos

internal:
  shared-secret: ${INTERNAL_SHARED_SECRET}