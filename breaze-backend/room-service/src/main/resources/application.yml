server:
  port: 8082

spring:
  application:
    name: room-service

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

app:
  # Por defecto, la auditoría sale por el API Gateway.
  auditoria-url: ${AUDITORIA_URL:http://localhost:8080/internal/audits}
